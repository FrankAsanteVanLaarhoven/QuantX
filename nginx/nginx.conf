server {
    listen 80;
    server_name quantxos.com iqxos.com www.quantxos.com www.iqxos.com;

    # Defense In Depth: Primary Security Configuration
    server_tokens off; # Hides the specific Nginx version from potential attackers
    
    # Restrict MIME type sniffing to prevent cross-site scripting
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enforce strict clickjacking protection
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Modern XSS filtering (although largely replaced by CSP, still good practice for legacy clients)
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Strict Transport Security (HSTS) - Enforces HTTPS in staging/production 
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Strict Referrer policy prevents URL parameter leakage across domains
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (CSP): Locks down executable resources
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss: http:;" always;
    
    # Restricts browser feature API access (camera, mic)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        proxy_pass http://frontend-spatial-os:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend-a100-engine:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
