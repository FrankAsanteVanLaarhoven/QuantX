name: Strict SSH Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-to-gcp:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            # Clone or Update Repo
            cd /home/frankleroyvan/quantX || git clone https://github.com/FrankAsanteVanLaarhoven/QuantX.git /home/frankleroyvan/quantX
            cd /home/frankleroyvan/quantX
            git pull origin main
            
            # Generate dynamic public environment configuration locally on the server
            echo "NEXT_PUBLIC_WS_URL=wss://api.iqxos.com/ws/telemetry" > .env
            echo "NEXT_PUBLIC_API_URL=https://api.iqxos.com" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            
            # Purge and Re-fabricate the GPU Docker Network
            sudo docker-compose down
            sudo docker-compose config
            sudo docker-compose build --no-cache
            sudo docker-compose up -d
