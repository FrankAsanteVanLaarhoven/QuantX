services:
  backend-a100-engine:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - quantx_net

  # [SOTA FIX]: Gemma and Personaplex nodes commented out to resolve the Apple Silicon crash.
  # Mac hardware prohibits 'nvidia' drivers. Future iterations will utilize direct MPS architecture.

  frontend-spatial-os:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws/telemetry}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend-a100-engine
    networks:
      - quantx_net

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-spatial-os
      - backend-a100-engine
    networks:
      - quantx_net

networks:
  quantx_net:
    driver: bridge
